# Dependabot：自动为 Gradle 依赖与 GitHub Actions 创建版本更新 PR
# 文档：https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: ci
