name: Android

# 触发：
# - develop / main 分支 push、PR：跑 debug 构建 + Android lint，上传 APK 供下载
# - 推 tag `v*`：在 build job 通过后跑 release job，用 keystore secrets 签名并
#   附到 GitHub Release（需要在 repo Settings → Secrets 配置以下四个：
#   - RELEASE_KEYSTORE_BASE64：keystore 文件的 base64（`base64 -w0 release.jks`）
#   - RELEASE_STORE_PASSWORD / RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Android Lint (Debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Lint Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Signed Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::缺少 GitHub Secret: ${name}"
              exit 1
            fi
          done
          mkdir -p "$HOME/.keystore"
          # macOS 生成的 Base64 常带换行，解码前去掉空白，避免 GNU base64: invalid input
          printf '%s' "${RELEASE_KEYSTORE_BASE64}" | tr -d ' \n\r\t' | base64 --decode > "$HOME/.keystore/workscribe-release.jks"
          if [ ! -s "$HOME/.keystore/workscribe-release.jks" ]; then
            echo "::error::keystore 解码失败，请用单行 Base64 重新设置 RELEASE_KEYSTORE_BASE64"
            echo "macOS: openssl base64 -in release.jks -A | pbcopy"
            echo "Linux: base64 -w0 release.jks"
            exit 1
          fi
          {
            echo "storeFile=$HOME/.keystore/workscribe-release.jks"
            echo "storePassword=${RELEASE_STORE_PASSWORD}"
            echo "keyAlias=${RELEASE_KEY_ALIAS}"
            echo "keyPassword=${RELEASE_KEY_PASSWORD}"
          } > keystore.properties

      # 发版前须先 bump 并提交 version.properties，再打同名 tag（避免 CI 与本地版本不一致）
      - name: Verify version.properties matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -z "$TAG" ]; then
            echo "::error::需要 refs/tags/v* 形式的 tag"
            exit 1
          fi
          NAME=$(grep '^VERSION_NAME=' version.properties | cut -d= -f2- | tr -d '\r')
          CODE=$(grep '^VERSION_CODE=' version.properties | cut -d= -f2- | tr -d '\r')
          if [ "$TAG" != "$NAME" ]; then
            echo "::error::Git tag v${TAG} 与 version.properties 的 VERSION_NAME=${NAME} 不一致"
            echo "请先执行: ./scripts/bump-version.sh ${TAG}"
            echo "然后: git add version.properties && git commit && git tag v${TAG}"
            exit 1
          fi
          echo "版本校验通过: VERSION_NAME=${NAME}, VERSION_CODE=${CODE}"

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Assemble Release
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Clean up keystore
        if: always()
        run: |
          rm -f keystore.properties
          rm -rf "$HOME/.keystore"
